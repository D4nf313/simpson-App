# ==================== Server ====================
server.port=8080

# ==================== DataSource (MySQL) ====================
spring.datasource.url=jdbc:mysql://localhost:3306/simpsons_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1395
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==================== Cache (Caffeine) ====================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s
spring.cache.cache-names=characters,charactersList

# ==================== Logging ====================
logging.level.com.simpsons=DEBUG
logging.level.org.springframework.cache=TRACE

# ==================== OpenAPI / Swagger ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
